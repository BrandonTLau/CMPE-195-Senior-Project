version: '3.8'
 
services:
  mongodb:
    image: mongo:7.0
    container_name: notescan_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    environment:
      MONGO_INITDB_DATABASE: notescan_db
    networks:
      - notescan_net
 
  backend:
    build: .
    container_name: notescan_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongodb:27017/notescan_db
    depends_on:
      - mongodb
    networks:
      - notescan_net
 
  ocr_backend:
    build: ./ocr_backend
    container_name: notescan_ocr
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ocr_uploads:/app/uploads
      - ocr_output:/app/output
    env_file:
      - .env
    environment:
      # Chandra — Datalab hosted API key (set CHANDRA_API_KEY in your .env file)
      CHANDRA_API_KEY: ${CHANDRA_API_KEY}
      CHANDRA_MODE: ${CHANDRA_MODE:-fast}
      CHANDRA_TIMEOUT_SECONDS: ${CHANDRA_TIMEOUT_SECONDS:-120}
    networks:
      - notescan_net
 
volumes:
  mongodb_data:
  uploads_data:
  ocr_uploads:
  ocr_output:
 
networks:
  notescan_net:
    driver: bridge
 