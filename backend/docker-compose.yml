version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: notescan_mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d:ro
    environment:
      MONGO_INITDB_DATABASE: notescan_db
    networks:
      - notescan_net

  # to run backend inside Docker alongside MongoDB
  backend:
    build: .
    container_name: notescan_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://mongodb:27017/notescan_db
    depends_on:
      - mongodb
    networks:
      - notescan_net

volumes:
  mongodb_data:
  uploads_data:

networks:
  notescan_net:
    driver: bridge