name: CI
 
on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
 
jobs:
  # ── Frontend (Brandon) ──────────────────────────────────────────────────────
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
 
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
 
      - name: Run linter
        working-directory: frontend
        run: npm run lint --if-present
 
      - name: Run tests
        working-directory: frontend
        run: npm run test:run
 
      - name: Generate coverage report
        working-directory: frontend
        run: npm run test:coverage
 
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
 
  # ── Backend (Taras) ─────────────────────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json
 
      - name: Install dependencies
        working-directory: backend
        run: npm ci
 
      - name: Run tests
        working-directory: backend
        run: npm test --if-present
 
  # ── OCR Backend ─────────────────────────────────────────────────────────────
  ocr-tests:
    name: OCR Backend Tests
    runs-on: ubuntu-latest
 
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
 
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
 
      - name: Install dependencies
        working-directory: ocr_backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt --if-present || echo "No requirements.txt found"
 
      - name: Run tests
        working-directory: ocr_backend
        run: pytest --if-exists || echo "No tests found yet"
 