name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  #frontend
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run linter
        working-directory: frontend
        run: npm run lint --if-present || true

      - name: Run tests
        working-directory: frontend
        run: npm run test:run

      - name: Generate coverage report
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  #backend
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Run linter
        working-directory: backend
        run: npm run lint --if-present || true

      - name: Run unit tests
        working-directory: backend
        run: npm run test:unit
        env:
          NODE_ENV: test

      - name: Run integration tests
        working-directory: backend
        run: npm run test:integration
        env:
          NODE_ENV: test

      - name: Run end-to-end tests
        working-directory: backend
        run: npm run test:e2e
        env:
          NODE_ENV: test

      - name: Generate coverage report
        working-directory: backend
        run: npm run test:coverage
        env:
          NODE_ENV: test

      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: docs/evaluation/coverage-report/backend

      - name: Coverage summary
        working-directory: backend
        run: |
          echo "### Backend Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat ../docs/evaluation/coverage-report/backend/coverage-summary.json | node -e "
            const s = JSON.parse(require('fs').readFileSync(0, 'utf-8')).total;
            const pct = (k) => s[k].pct.toFixed(2) + '%';
            console.log('Statements: ' + pct('statements'));
            console.log('Branches:   ' + pct('branches'));
            console.log('Functions:  ' + pct('functions'));
            console.log('Lines:      ' + pct('lines'));
          " >> $GITHUB_STEP_SUMMARY || true
          echo '```' >> $GITHUB_STEP_SUMMARY

  #ocr backend
  ocr-tests:
    name: OCR Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            ocr_backend/requirements.txt
            ocr_backend/requirements-dev.txt

      - name: Install OCR dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r ocr_backend/requirements.txt
          python -m pip install -r ocr_backend/requirements-dev.txt

      - name: Run OCR tests with coverage
        env:
          OCR_SKIP_MODEL_LOAD: "1"
        run: |
          pytest tests/unit/ocr tests/integration/ocr \
            --cov=ocr_backend \
            --cov-report=term \
            --cov-report=html:docs/evaluation/coverage-report/ocr \
            --cov-report=xml:docs/evaluation/coverage-report/ocr/coverage.xml

      - name: Upload OCR coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: ocr-coverage
          path: docs/evaluation/coverage-report/ocr